---
- name: One-Touch vuSmartMaps Installation
  hosts: all
  become: yes
  vars:
    # Defaults (can be overridden by Go)
    download_user: "customer"
    download_pass: "customer#7814"
    vunet_user: "vunet"
    target_dir: "/home/{{ ansible_user }}"
    version: "3.0"  # Default, can be overridden
  
  roles:
    - vusmartmaps