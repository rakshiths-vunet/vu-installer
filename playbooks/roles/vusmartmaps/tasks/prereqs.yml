---
- name: Update /etc/hosts for Datahub
  lineinfile:
    path: /etc/hosts
    line: "103.65.21.234 vunet-datahub.cs2ccloud.internal vunet-datahub-0.cs2ccloud.internal"
    state: present

- name: Create 'vunet' group
  group:
    name: vunet
    state: present

- name: Create 'vunet' user
  user:
    name: "{{ vunet_user }}"
    group: vunet
    generate_ssh_key: yes
    ssh_key_bits: 2048
    ssh_key_file: .ssh/id_rsa
    shell: /bin/bash

- name: Fetch public keys from all nodes
  shell: cat /home/{{ vunet_user }}/.ssh/id_rsa.pub
  register: public_keys
  changed_when: false
  become_user: "{{ vunet_user }}"

- name: Add public keys to authorized_keys on all nodes
  authorized_key:
    user: "{{ vunet_user }}"
    key: "{{ hostvars[item].public_keys.stdout }}"
    state: present
  loop: "{{ groups[node_name] | default([inventory_hostname]) }}"
  when: hostvars[item].public_keys is defined
  become_user: "{{ vunet_user }}"

- name: Setup SSH known_hosts for internal access
  shell: |
    ssh-keyscan -H {{ hostvars[item].ansible_host | default(item) }} >> /home/{{ vunet_user }}/.ssh/known_hosts
  loop: "{{ groups[node_name] | default([inventory_hostname]) }}"
  become_user: "{{ vunet_user }}"
  args:
    executable: /bin/bash
  changed_when: false

- name: Ensure correct permissions on .ssh
  file:
    path: /home/{{ vunet_user }}/.ssh
    state: directory
    owner: "{{ vunet_user }}"
    group: vunet
    mode: '0700'
    recurse: yes

- name: Create Data Directory
  file:
    path: /data1
    state: directory
    owner: "{{ vunet_user }}"
    group: vunet
    recurse: yes

- name: Apply Sysctl settings
  sysctl:
    name: "{{ item }}"
    value: '2099999999'
    state: present
    reload: yes
  loop:
    - fs.inotify.max_user_watches
    - fs.inotify.max_user_instances
    - fs.inotify.max_queued_events